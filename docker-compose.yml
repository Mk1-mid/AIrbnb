services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rentalplatform
      POSTGRES_USER: rental
      POSTGRES_PASSWORD: rental123
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rental -d rentalplatform"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: Host=db;Port=5432;Database=rentalplatform;Username=rental;Password=rental123
      Jwt__Key: dev-secret-change-me-dev-secret-change-me
      Jwt__Issuer: RentalPlatform
      Jwt__Audience: RentalPlatformClients
      Jwt__ExpiresInMinutes: 60
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

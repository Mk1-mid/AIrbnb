services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rentaldb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: Host=db;Database=rentaldb;Username=postgres;Password=postgres
      Jwt__Key: dev-secret-change-me-dev-secret-change-me
      Jwt__Issuer: RentalPlatform
      Jwt__Audience: RentalPlatform
      Mailer__BaseUrl: http://mailer:8081
      Gemini__ApiKey: AIzaSyAb8RN6JgQNbqheB3UJ-TJHxc1vGFPruGyEvbMJQKnM9d-lZ7Lw
      Kyc__TestMode: "true"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  mailer:
    build:
      context: services/mailer
      dockerfile: Dockerfile
    environment:
      MAIL_HOST: sandbox.smtp.mailtrap.io
      MAIL_PORT: 2525
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_ENCRYPTION: tls
    ports:
      - "8081:8081"

volumes:
  postgres_data:
